# Staging environment overrides.
# Apply with:
#   helm upgrade --install codeforphilly-staging deploy/charts/codeforphilly \
#     --namespace codeforphilly-staging --create-namespace \
#     -f deploy/charts/codeforphilly/values.staging.yaml \
#     --set image.tag=<git-sha>

ingress:
  hosts:
    - host: codeforphilly-rewrite-staging.k8s.phl.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: codeforphilly-staging-tls
      hosts:
        - codeforphilly-rewrite-staging.k8s.phl.io

# Staging starts on the filesystem private-store backend — no bucket required
# to stand up. Flip to s3 once a staging bucket is provisioned (see
# docs/operations/deploy.md#bucket-provisioning).
storage:
  backend: filesystem

privateStorage:
  pvc:
    enabled: true
    size: 1Gi

publicEnv:
  # Point at the public scrubbed snapshot for staging by default so we never
  # leak production data through the staging UI. Swap to the real data repo
  # once cutover-prep wires staging to a real (still-private) data remote.
  CFP_DATA_REMOTE: https://github.com/CodeForPhilly/codeforphilly-data-snapshot.git

# Staging deploy key is optional — the snapshot repo is public, so an SSH key
# is only needed when CFP_DATA_REMOTE is the real (private) data remote.
deployKey:
  secretName: ""

# Smaller footprint for staging.
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
