apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codeforphilly.fullname" . }}
  labels:
    {{- include "codeforphilly.labels" . | nindent 4 }}
spec:
  # replicas: 1 is a hard constraint per specs/architecture.md (in-process
  # write mutex serializes mutations).
  replicas: {{ .Values.replicaCount }}
  strategy:
    # Recreate (not RollingUpdate) so the old pod releases the write lock
    # before the new one starts. Two pods writing to the same gitsheets repo
    # would corrupt state.
    type: Recreate
  selector:
    matchLabels:
      {{- include "codeforphilly.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "codeforphilly.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the pod whenever the ConfigMap changes — values-driven env
        # tweaks shouldn't require image bumps to take effect.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "codeforphilly.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "codeforphilly.fullname" . }}-env
            {{- range .Values.secretEnvFrom }}
            - secretRef:
                name: {{ .name }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.dataRepo.pvc.enabled }}
            - name: data
              mountPath: {{ .Values.env.CFP_DATA_REPO_PATH | default "/app/data" }}
            {{- end }}
            {{- if and (eq .Values.storage.backend "filesystem") .Values.privateStorage.pvc.enabled }}
            - name: private-storage
              mountPath: {{ .Values.env.CFP_PRIVATE_STORAGE_PATH | default "/app/private-storage" }}
            {{- end }}
            {{- if .Values.deployKey.secretName }}
            - name: deploy-key
              mountPath: {{ .Values.deployKey.mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.dataRepo.pvc.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "codeforphilly.dataPvcName" . }}
        {{- end }}
        {{- if and (eq .Values.storage.backend "filesystem") .Values.privateStorage.pvc.enabled }}
        - name: private-storage
          persistentVolumeClaim:
            claimName: {{ include "codeforphilly.privatePvcName" . }}
        {{- end }}
        {{- if .Values.deployKey.secretName }}
        - name: deploy-key
          secret:
            secretName: {{ .Values.deployKey.secretName }}
            defaultMode: 0400
            items:
              - key: id_ed25519
                path: id_ed25519
              {{- if .Values.deployKey.knownHostsConfigMap }}
        - name: deploy-key-known-hosts
          configMap:
            name: {{ .Values.deployKey.knownHostsConfigMap }}
              {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
