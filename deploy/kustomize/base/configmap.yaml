apiVersion: v1
kind: ConfigMap
metadata:
  name: codeforphilly-env
data:
  CFP_DATA_REPO_PATH: "/app/data"
  CFP_PRIVATE_STORAGE_PATH: "/app/private-storage"
  CFP_WEB_DIST_PATH: "/app/apps/web/dist"
  GIT_AUTHOR_EMAIL: "api@codeforphilly.org"
  GIT_AUTHOR_NAME: "CodeForPhilly API"
  NODE_ENV: "production"
  # Bump Node's old-space heap ceiling above the default (~400Mi on Linux
  # containers) so the in-memory record set + secondary indices + FTS fit.
  # Keep ~25% headroom below the container's memory limit for ephemeral
  # work (request handling, gitsheets tree mutations, etc.).
  NODE_OPTIONS: "--max-old-space-size=1536"
  PORT: "3001"
  STORAGE_BACKEND: "filesystem"
  # The runtime-served branch. `published` is the long-term sandbox + prod
  # default — it accumulates importer snapshots (via merges from
  # `legacy-import`) on top of new-in-v1 records the running API writes.
  # Override per-pod via the `CFP_DATA_BRANCH` env var, e.g. point a debug
  # deployment at `fixture` (small handful of seed records) or directly at
  # `legacy-import` (raw snapshot, no merged runtime writes).
  CFP_DATA_BRANCH: "published"
  # SSH key for the data repo deploy key (private branch reads).
  # accept-new keeps first-connect simple; strict host-key checking via
  # known_hosts ConfigMap is an overlay concern.
  GIT_SSH_COMMAND: "ssh -i /etc/cfp-data-deploy-key/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null"
