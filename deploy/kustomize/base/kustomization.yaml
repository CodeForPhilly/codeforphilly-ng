apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base manifests for the codeforphilly-rewrite app. Environment-specific
# variation lives in overlays/<env>/. Apply with `kubectl apply -k
# deploy/kustomize/overlays/<env>`.

labels:
  - pairs:
      app.kubernetes.io/name: codeforphilly
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: true

resources:
  - serviceaccount.yaml
  - configmap.yaml
  - pvc-data.yaml
  - pvc-private.yaml
  - service.yaml
  - deployment.yaml
  - gateway.yaml
  - httproute.yaml

images:
  - name: ghcr.io/codeforphilly/codeforphilly-ng
    newTag: sandbox
