apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codeforphilly
  annotations:
    # cert-manager will provision a TLS cert via Let's Encrypt prod.
    # Per-overlay can override to letsencrypt-staging for high-churn iteration
    # (prod rate-limits to 50 certs/week per registered domain).
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: [PLACEHOLDER_HOST]
      secretName: codeforphilly-tls
  rules:
    - host: PLACEHOLDER_HOST
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: codeforphilly
                port:
                  number: 80
