apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: codeforphilly
  annotations:
    # cert-manager watches Gateways with this annotation and creates a
    # Certificate that resolves into the listener's certificateRef Secret.
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      hostname: PLACEHOLDER_HOST
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: codeforphilly-gw-tls
