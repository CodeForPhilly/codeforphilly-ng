apiVersion: apps/v1
kind: Deployment
metadata:
  name: codeforphilly
spec:
  # Single replica is a hard architectural constraint — the in-process write
  # mutex serializes gitsheets commits. See specs/architecture.md.
  replicas: 1
  strategy:
    # Recreate, not RollingUpdate: two pods writing the same gitsheets repo
    # would corrupt state. Old pod must release the lock before new starts.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: codeforphilly
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codeforphilly
    spec:
      serviceAccountName: codeforphilly
      securityContext:
        fsGroup: 1000
      containers:
        - name: codeforphilly
          image: ghcr.io/codeforphilly/codeforphilly-ng:sandbox
          # Always pull — sandbox tag is mutable (re-pushed on each iteration).
          # Production overlays should pin to a digest and flip this to IfNotPresent.
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: codeforphilly-env
            - secretRef:
                name: codeforphilly-secrets
          env:
            - name: HOST
              value: "0.0.0.0"
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: private
              mountPath: /app/private-storage
            - name: deploy-key
              mountPath: /etc/cfp-data-deploy-key
              readOnly: true
          # Readiness probe gates traffic until both stores have loaded.
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: 1000m
              # Holds the full public dataset + secondary indices + FTS in
              # memory (~31.8k people, 268 projects, 10.4k tag-assignments, …).
              # 2.5Gi (was 2Gi): a cold boot rebuilding state from the full
              # `published` import exceeded the prior 1536Mi heap; raised to
              # NODE_OPTIONS=--max-old-space-size=2048 (see configmap.yaml),
              # with the container limit just above that for the off-heap FTS5
              # store + ephemeral request work. Kept at 2.5Gi (not higher) so
              # a single pod can't starve a node — these nodes are only ~3.9Gi
              # and a 3.5Gi trial drove one NodeNotReady. ~1.4Gi node headroom.
              memory: 2560Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      volumes:
        # Data repo lives as a bare clone — ephemeral. Re-cloned from origin
        # on every pod boot; objects-only (~50 MB) so the clone is cheap.
        # Persisting across pod restarts buys nothing because the bare
        # clone is fully recoverable from the git remote.
        - name: data
          emptyDir: {}
        - name: private
          persistentVolumeClaim:
            claimName: codeforphilly-private
        - name: deploy-key
          secret:
            secretName: codeforphilly-data-deploy-key
            defaultMode: 0400
